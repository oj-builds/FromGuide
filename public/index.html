<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormGuide — Government Form Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">FormGuide</span>
        <button id="closeSidebar" class="icon-btn mobile-only">✕</button>
      </div>
      <button id="newChatBtn" class="new-chat-btn">+ New chat</button>
      <div class="sidebar-section-label">Recent conversations</div>
      <div id="chatList" class="chat-list"></div>
    </aside>

    <!-- Main area -->
    <div class="main-area">
      <header class="letterhead">
        <button id="openSidebar" class="icon-btn mobile-only">☰</button>
        <div class="seal">🖋️</div>
        <div>
          <div class="app-name">FormGuide</div>
          <div class="app-tag">Government form assistance</div>
        </div>
      </header>

      <div id="suggestions" class="suggestions">

  <div class="welcome-card">
    <h2>👋 Welcome to FormGuide AI</h2>
    <p>Your personal AI assistant for government services, careers and education.</p>
  </div>

  <button class="chip" data-text="Help me get my NIN">
    🏛 Government Services
  </button>

  <button class="chip" data-text="Help me build my CV">
    📄 Build My CV
  </button>

  <button class="chip" data-text="Practice an interview with me">
    🎤 Interview Practice
  </button>

  <button class="chip" data-text="Help me find scholarships">
    🎓 Education
  </button>

  <button class="chip" data-text="Explain this government document">
    📂 Document Assistant
  </button>

  <button class="chip" data-text="I need help today">
    💬 Ask Anything
  </button>

</div>

      <main id="chat" class="chat"></main>

      <form id="chat-form" class="input-bar">
        <input id="chat-input" type="text" placeholder="Ask about any form…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

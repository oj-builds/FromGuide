<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormGuide AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">🏛️</span>
        <span class="sidebar-title">FormGuide <span class="accent">AI</span></span>
        <button id="closeSidebar" class="icon-btn mobile-only">✕</button>
      </div>

      <button id="newChatBtn" class="new-chat-btn">+ New chat</button>

      <div class="sidebar-section-label">Recent conversations</div>
      <div id="chatList" class="chat-list"></div>

      <div class="sidebar-footer">
        <button class="upgrade-btn">👑 Upgrade to Pro</button>
        <button class="guest-btn">👤 Guest User <span class="chevron">⌄</span></button>
      </div>
    </aside>

    <!-- Main area -->
    <div class="main-area">
      <header class="topbar">
        <button id="openSidebar" class="icon-btn mobile-only">☰</button>
        <span class="topbar-logo">🏛️</span>
        <div>
          <div class="topbar-title">FormGuide <span class="accent">AI</span></div>
          <div class="topbar-tag">AI for Government • Careers • Education</div>
        </div>
      </header>

      <main id="chat" class="chat">
        <div id="welcomeScreen" class="welcome-screen">
          <div class="welcome-card">
            <div class="welcome-text">
              <h2>👋 Welcome to FormGuide AI</h2>
              <p>Your personal AI assistant for government services, careers and education.</p>
            </div>
            <div class="welcome-illustration">🏛️</div>
          </div>

          <div class="feature-grid">
            <button class="feature-card" data-text="Help me apply for NIN.">
              <span class="icon">🏛️</span>
              <h3>Government</h3>
              <p>NIN, Passport, BVN, CAC, NYSC and more.</p>
            </button>
            <button class="feature-card" data-text="Help me build a professional CV.">
              <span class="icon">💼</span>
              <h3>Career</h3>
              <p>Create CVs, cover letters and prepare for interviews.</p>
            </button>
            <button class="feature-card" data-text="Help me with JAMB admission.">
              <span class="icon">🎓</span>
              <h3>Education</h3>
              <p>JAMB, WAEC, scholarships and admissions.</p>
            </button>
            <button class="feature-card" data-text="Help me understand official documents.">
              <span class="icon">📄</span>
              <h3>Documents</h3>
              <p>Understand official forms and required documents.</p>
            </button>
            <button class="feature-card" data-text="Let's practice an interview.">
              <span class="icon">🎙️</span>
              <h3>Interview Practice</h3>
              <p>Practice interview questions and get AI feedback.</p>
            </button>
            <button class="feature-card" data-text="Create a learning roadmap for me.">
              <span class="icon">🎯</span>
              <h3>My Journey</h3>
              <p>Get step-by-step plans and track your progress.</p>
            </button>
            <button class="feature-card" data-text="Find scholarships I can apply for.">
              <span class="icon">🔖</span>
              <h3>Scholarships</h3>
              <p>Find and apply for scholarships easily.</p>
            </button>
            <button class="feature-card" id="askAnythingCard" data-focus-only="true">
              <span class="icon">💬</span>
              <h3>Ask Anything</h3>
              <p>Ask any question and get instant AI answers.</p>
            </button>
          </div>
        </div>

        <div id="messages" class="messages"></div>
      </main>

      <form id="chat-form" class="input-bar">
        <input id="chat-input" type="text" placeholder="Ask about any form…" autocomplete="off" />
        <button type="submit">➤ Send</button>
      </form>
      <div class="disclaimer">FormGuide AI can make mistakes. Please verify important information.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
